<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>View Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Admin Panel</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav" aria-controls="adminNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="adminNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="admin_dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="admin_view-feedback.html">View Feedback</a></li>
          <li class="nav-item"><a class="nav-link" href="admin_manage-courses.html">Manage Courses</a></li>
          <li class="nav-item"><a class="nav-link active" href="admin_analysis.html">Feedback Analysis</a></li>
          <li class="nav-item"><a class="nav-link" href="admin_profile.html">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="container my-4">
    <h1>Student Feedback List</h1>
    <table class="table table-striped table-bordered mt-3">
      <thead class="table-primary">
        <tr>
          <th>#</th>
          <th>Student Name</th>
          <th>Course/Teacher</th>
          <th>Feedback</th>
          <th>Date Submitted</th>
        </tr>
      </thead>
      <tbody id="feedbackTableBody">
        <!-- Feedback entries will be injected here -->
      </tbody>
    </table>
  </div>

  <script>
    // Example static feedback data
    const feedbackData = [
      {name: "Lakshmi", course: "Web Technology", feedback: "Great course!", date: "2025-09-25"},
      {name: "Vasavi", course: "Data Structure", feedback: "Needs more examples.", date: "2025-09-26"},
    ];

    const tbody = document.getElementById('feedbackTableBody');

    feedbackData.forEach((fb, index) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${index + 1}</td>
        <td>${fb.name}</td>
        <td>${fb.course}</td>
        <td>${fb.feedback}</td>
        <td>${fb.date}</td>
      `;
      tbody.appendChild(tr);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

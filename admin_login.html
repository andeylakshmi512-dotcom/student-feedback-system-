<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f7fa;
    }

    /* TOP NAVBAR */
    .navbar {
        background-color: #1da2f3;
        padding: 15px;
        text-align: right;
    }

    .navbar a {
        color: white;
        margin: 0 15px;
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
    }

    /* LOGIN BOX */
    .login-container {
        width: 350px;
        margin: 100px auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        font-size: 28px;
        color: #333;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #1da2f3;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0c7ec2;
    }

    /* FOOTER */
    footer {
        text-align: center;
        padding: 15px;
        background-color: #111;
        color: white;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
</style>
</head>
<body>

<!-- NAVIGATION BAR -->
<div class="navbar">
    <a href="#">Admin Login</a>
    <a href="../client/client_home.html">Home</a>
    <a href="../client/client_feedback.html">Feedback</a>
    <a href="../client/client_courses.html">Courses</a>
    <a href="../client/client_contact.html">Contact</a>
</div>

<!-- LOGIN BOX -->
<div class="login-container">
    <h2>Admin Login</h2>

    <!-- When admin logs in, take to admin dashboard -->
    <form action="admin_dashboard.html">
        <input type="text" placeholder="Admin Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<!-- FOOTER -->
<footer>
    © 2025 Student Feedback System. All rights reserved.
</footer>

</body>
</html>

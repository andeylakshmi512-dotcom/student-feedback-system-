  <title>Admin Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Admin Panel</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav" aria-controls="adminNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="adminNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="admin_dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="admin_view-feedback.html">View Feedback</a></li>

  <!-- Content -->
  <div class="container my-4" style="max-width: 600px;">
    <h1>Admin Profile</h1>

    <form>
      <div class="mb-3">
        <label for="adminName" class="form-label">Name</label>
        <input type="text" class="form-control" id="adminName" value="Admin User" />
      </div>
      <div class="mb-3">
        <label for="adminEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="adminEmail" value="admin@example.com" />
      </div>
      <div class="mb-3">
        <label for="adminPassword" class="form-label">Change Password</label>
        <input type="password" class="form-control" id="adminPassword" placeholder="New Password" />
      </div>
      <button type="submit" class="btn btn-primary">Update Profile</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

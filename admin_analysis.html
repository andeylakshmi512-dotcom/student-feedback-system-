<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Admin Panel</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav" aria-controls="adminNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="adminNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="admin_dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="admin_view-feedback.html">View Feedback</a></li>
          <li class="nav-item"><a class="nav-link" href="admin_manage-courses.html">Manage Courses</a></li>
          <li class="nav-item"><a class="nav-link active" href="admin_analysis.html">Feedback Analysis</a></li>
          <li class="nav-item"><a class="nav-link" href="admin_profile.html">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="container my-4">
    <h1>Feedback Analysis</h1>
    <canvas id="feedbackChart" style="max-width: 600px;"></canvas>
  </div>

  <script>
    // Sample data for chart
    const ctx = document.getElementById('feedbackChart').getContext('2d');
    const feedbackChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Web Technology', 'AJT', 'DBMS','Data Structure','Probability & Statistics'],
        datasets: [{
          label: 'Number of Feedbacks',
          data: [1,3, 5,4,7],
          backgroundColor: ['#0d6efd', '#198754', '#0dcaf0']
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
